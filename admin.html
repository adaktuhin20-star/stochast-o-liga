<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCHAST-O-LIGA | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .space-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at bottom, #082f49 0%, #030712 100%); overflow: hidden; }
        .stars { position: absolute; width: 100%; height: 100%; background: transparent; }
        .stars::after { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 140px 70px, #e0f2fe, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #bae6fd, rgba(0,0,0,0)), radial-gradient(2.5px 2.5px at 160px 120px, #ffffff, rgba(0,0,0,0)); background-repeat: repeat; background-size: 250px 250px; animation: moveStars 150s linear infinite; opacity: 0.4; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: -10000px 5000px; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-300 font-mono h-screen flex flex-col overflow-hidden">
    
    <div class="space-bg"><div class="stars"></div></div>

    <div class="shrink-0 bg-slate-950/90 backdrop-blur border-b border-cyan-800 p-4 shadow-[0_10px_30px_rgba(0,0,0,0.8)] z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Logo" class="h-20 w-auto object-contain" onerror="this.outerHTML='<div class=\\'h-10 w-10 bg-slate-900 border border-slate-700 rounded-lg flex items-center justify-center text-[10px] text-slate-500 font-bold\\'>LOGO</div>'">
                <div>
                    <h1 class="text-xl font-bold text-slate-100 tracking-widest flex items-center gap-2">MASTER CONTROL</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="sysStatusBadge" class="bg-amber-900/50 text-amber-500 border border-amber-500 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest animate-pulse">PAUSED</span>
                        <span class="text-[10px] text-slate-400 font-bold"><i data-lucide="eye" class="w-3 h-3 inline"></i> <span id="audienceCount">0</span> AUDIENCE LOGGED IN</span>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <button id="reloginToggle" onclick="toggleRelogin()" class="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 font-bold py-2 px-4 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm">
                    <i data-lucide="users" class="w-4 h-4"></i> RESTARTS: BLOCKED
                </button>
                <div class="w-px bg-slate-800 mx-1 hidden sm:block"></div>
                <button onclick="setSystemStatus('playing')" class="flex-1 sm:flex-none bg-emerald-900/80 hover:bg-emerald-700 border border-emerald-500 text-emerald-100 font-bold py-2 px-6 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm shadow-[0_0_10px_rgba(16,185,129,0.3)]">
                    <i data-lucide="play" class="w-4 h-4"></i> START / RESUME
                </button>
                <button onclick="setSystemStatus('paused')" class="flex-1 sm:flex-none bg-amber-900/80 hover:bg-amber-700 border border-amber-500 text-amber-100 font-bold py-2 px-6 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm shadow-[0_0_10px_rgba(245,158,11,0.3)]">
                    <i data-lucide="pause" class="w-4 h-4"></i> PAUSE NETWORK
                </button>
                <button onclick="globalRestart()" class="flex-1 sm:flex-none bg-red-900/80 hover:bg-red-700 border border-red-500 text-red-100 font-bold py-2 px-6 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm mt-2 sm:mt-0">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> RESET ALL
                </button>
            </div>
        </div>
    </div>

    <div class="flex-1 p-4 md:p-8 flex flex-col xl:flex-row gap-8 max-w-7xl mx-auto w-full min-h-0">
        
        <div class="w-full xl:w-1/3 bg-slate-900/60 backdrop-blur border border-slate-700 p-4 sm:p-6 rounded-lg shadow-2xl overflow-y-auto custom-scroll shrink-0">
            <h2 class="text-lg font-bold text-fuchsia-500 mb-2 flex items-center gap-2 uppercase tracking-widest"><i data-lucide="settings" class="w-5 h-5"></i> Configure Team</h2>
            <hr class="border-slate-800 mb-4">
            
            <form id="adminForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase mb-1">Team ID</label>
                        <input type="text" id="teamId" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-cyan-300 text-xs" required>
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase mb-1">Display Name</label>
                        <input type="text" id="teamName" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-cyan-300 text-xs" required>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase mb-1">Access Code</label>
                    <input type="text" id="accessCode" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-cyan-300 text-xs" required>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase mb-1">Target Path (7 comma-separated numbers, Last one is Treasure)</label>
                    <input type="text" id="targetPath" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-emerald-400 font-bold tracking-widest text-xs" placeholder="e.g. 10, 20, 30, 40, 50, 60, 99" required>
                </div>
                <div class="space-y-2 border border-slate-800 p-3 rounded bg-slate-950/50">
                    <h3 class="text-[10px] font-bold text-cyan-500 uppercase">Clues & Directives (Supports LaTeX)</h3>
                    <textarea id="q1" placeholder="Clue 1..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-300 h-10" required></textarea>
                    <textarea id="q2" placeholder="Clue 2..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-300 h-10" required></textarea>
                    <textarea id="q3" placeholder="Clue 3..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-300 h-10" required></textarea>
                    <textarea id="q4" placeholder="Clue 4..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-300 h-10" required></textarea>
                    <textarea id="q5" placeholder="Clue 5..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-300 h-10" required></textarea>
                    <textarea id="q6" placeholder="Clue 6..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-300 h-10" required></textarea>
                    <textarea id="q7" placeholder="Final Answer (Leads directly to Treasure bubble)..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-fuchsia-300 h-10" required></textarea>
                </div>
                <button type="submit" class="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-slate-950 font-bold py-3 rounded tracking-widest transition-colors text-xs uppercase">Upload Config to Cloud</button>
                <div id="successMsg" class="text-emerald-500 text-center text-xs hidden font-bold mt-2">Team configured!</div>
            </form>
        </div>

        <div class="flex-1 bg-slate-900/40 backdrop-blur border border-slate-800 rounded-lg p-4 sm:p-6 flex flex-col min-h-0">
            <h2 class="text-lg font-bold text-cyan-500 flex items-center gap-2 uppercase tracking-widest mb-4 shrink-0"><i data-lucide="activity" class="w-5 h-5"></i> Live Roster</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto custom-scroll pr-2 pb-2" id="adminTeamList">
                <div class="text-center text-slate-500 py-10 animate-pulse col-span-full">Fetching live network data...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAzKmv4xmg_9pQhX06HUmV74J3Ge5e0l3o", authDomain: "stochastoliga.firebaseapp.com", projectId: "stochastoliga", storageBucket: "stochastoliga.firebasestorage.app", messagingSenderId: "684026163908", appId: "1:684026163908:web:a69ebd4a7dcdb83020cf91" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        lucide.createIcons();

        // Time Formatting Helper
        const formatTime = (secs) => {
            if (!secs) return "00:00";
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        onValue(ref(db, 'system/status'), (snapshot) => {
            const status = snapshot.val() || 'paused';
            const badge = document.getElementById('sysStatusBadge');
            if (status === 'playing') { badge.className = "bg-emerald-900/50 text-emerald-400 border border-emerald-500 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest"; badge.innerText = "NETWORK LIVE"; } 
            else { badge.className = "bg-amber-900/50 text-amber-500 border border-amber-500 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest animate-pulse"; badge.innerText = "PAUSED"; }
        });

        let allowReloginState = false;
        onValue(ref(db, 'system/allowRelogin'), (snapshot) => {
            allowReloginState = snapshot.val() === true;
            const btn = document.getElementById('reloginToggle');
            if (allowReloginState) { btn.className = "flex-1 sm:flex-none bg-blue-900/80 hover:bg-blue-700 border border-blue-500 text-blue-100 font-bold py-2 px-4 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm shadow-[0_0_10px_rgba(59,130,246,0.3)]"; btn.innerHTML = `<i data-lucide="users" class="w-4 h-4"></i> RESTARTS: ALLOWED`; } 
            else { btn.className = "flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 font-bold py-2 px-4 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm"; btn.innerHTML = `<i data-lucide="users" class="w-4 h-4"></i> RESTARTS: BLOCKED`; }
        });

        onValue(ref(db, 'system/audience'), (snap) => { document.getElementById('audienceCount').innerText = snap.exists() ? Object.keys(snap.val()).length : 0; });

        window.setSystemStatus = function(status) { set(ref(db, 'system/status'), status); }
        window.toggleRelogin = function() { set(ref(db, 'system/allowRelogin'), !allowReloginState); }

        document.getElementById('adminForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const teamId = document.getElementById('teamId').value.trim();
            const pathArray = document.getElementById('targetPath').value.split(',').map(num => parseInt(num.trim()));
            set(ref(db, 'teams/' + teamId), {
                id: teamId, name: document.getElementById('teamName').value.trim(), accessCode: document.getElementById('accessCode').value.trim().toLowerCase(),
                path: pathArray, questions: [ document.getElementById('q1').value, document.getElementById('q2').value, document.getElementById('q3').value, document.getElementById('q4').value, document.getElementById('q5').value, document.getElementById('q6').value, document.getElementById('q7').value ],
                stages: 0, hearts: 3, score: 0, timeTaken: 0, status: 'active', color: 'bg-cyan-500', clicked: []
            }).then(() => {
                document.getElementById('successMsg').classList.remove('hidden');
                setTimeout(() => document.getElementById('successMsg').classList.add('hidden'), 3000);
                e.target.reset(); 
            });
        });

        onValue(ref(db, 'teams'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('adminTeamList'); container.innerHTML = '';
            if (!data) return;

            for (const key in data) {
                const team = data[key]; window[`teamData_${key}`] = team; 
                const statusColor = team.status === 'active' ? 'text-emerald-400' : (team.status === 'eliminated' ? 'text-red-500' : 'text-fuchsia-400');

                // Modified card HTML to include "Time" column
                const cardHtml = `
                    <div class="bg-slate-950 border border-slate-700 p-4 rounded-lg flex flex-col justify-between gap-3 shadow-lg">
                        <div class="flex justify-between items-start">
                            <div class="overflow-hidden">
                                <div class="text-sm font-bold text-slate-200 uppercase tracking-widest truncate" title="${team.name}">${team.name}</div>
                                <div class="text-[10px] text-slate-500 font-mono">Code: <span class="text-cyan-400">${team.accessCode}</span></div>
                            </div>
                            <div class="text-[10px] font-bold uppercase border px-2 py-1 rounded ${statusColor} border-current ml-2 shrink-0">${team.status}</div>
                        </div>
                        <div class="flex gap-2 justify-between bg-slate-900 p-2 rounded border border-slate-800">
                            <div class="text-center w-full"><div class="text-[9px] text-slate-500 uppercase">Score</div><div class="text-lg font-bold text-emerald-400">${team.score || 0}</div></div>
                            <div class="text-center w-full border-x border-slate-800"><div class="text-[9px] text-slate-500 uppercase">Stage</div><div class="text-lg font-bold text-slate-200">${team.stages || 0}</div></div>
                            <div class="text-center w-full border-r border-slate-800"><div class="text-[9px] text-slate-500 uppercase">Lives</div><div class="text-lg font-bold text-red-500">${team.hearts !== undefined ? team.hearts : 3}</div></div>
                            <div class="text-center w-full"><div class="text-[9px] text-slate-500 uppercase">Time</div><div class="text-lg font-bold text-cyan-400">${formatTime(team.timeTaken)}</div></div>
                        </div>
                        <div class="flex gap-2 justify-end mt-1">
                            <button onclick="editTeam('${key}')" class="flex-1 bg-slate-800 hover:bg-cyan-900 border border-slate-600 text-[10px] py-1.5 rounded text-slate-300 uppercase tracking-widest font-bold">Edit</button>
                            <button onclick="nullifyProgress('${key}')" class="flex-1 bg-slate-800 hover:bg-amber-900 border border-slate-600 text-[10px] py-1.5 rounded text-amber-500 uppercase tracking-widest font-bold">Nullify</button>
                            <button onclick="deleteTeam('${key}')" class="bg-slate-800 hover:bg-red-900 border border-slate-600 px-3 py-1.5 rounded text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', cardHtml);
            }
            lucide.createIcons();
        });

        window.editTeam = function(teamId) {
            const t = window[`teamData_${teamId}`];
            document.getElementById('teamId').value = t.id; document.getElementById('teamName').value = t.name; document.getElementById('accessCode').value = t.accessCode; document.getElementById('targetPath').value = t.path.join(', ');
            if(t.questions) for(let i=0; i<7; i++) if(document.getElementById(`q${i+1}`)) document.getElementById(`q${i+1}`).value = t.questions[i] || '';
        }
        window.nullifyProgress = function(teamId) { if(confirm("Reset this team to 0?")) update(ref(db, 'teams/' + teamId), { stages: 0, hearts: 3, score: 0, timeTaken: 0, status: 'active', clicked: [] }); }
        window.deleteTeam = function(teamId) { if(confirm("DANGER: Delete team?")) remove(ref(db, 'teams/' + teamId)); }
        
        window.globalRestart = async function() {
            if(confirm("⚠️ INITIATING GLOBAL RESTART. Proceed?")) {
                try {
                    const snapshot = await get(ref(db, 'teams'));
                    if (snapshot.exists()) {
                        const updates = {};
                        snapshot.forEach((child) => {
                            updates[`teams/${child.key}/stages`] = 0; updates[`teams/${child.key}/hearts`] = 3; updates[`teams/${child.key}/score`] = 0; updates[`teams/${child.key}/timeTaken`] = 0; updates[`teams/${child.key}/status`] = 'active'; updates[`teams/${child.key}/clicked`] = [];
                        });
                        await update(ref(db), updates);
                        alert("Network successfully reset.");
                    } else { alert("No teams found to reset."); }
                } catch (error) { console.error(error); alert("Reset failed."); }
            }
        }
    </script>
</body>
</html>
