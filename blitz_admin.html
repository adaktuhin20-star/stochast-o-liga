<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCHAST-O-LIGA | Blitz Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .space-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at bottom, #082f49 0%, #030712 100%); overflow: hidden; }
        .stars { position: absolute; width: 100%; height: 100%; background: transparent; }
        .stars::after { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 140px 70px, #e0f2fe, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #bae6fd, rgba(0,0,0,0)), radial-gradient(2.5px 2.5px at 160px 120px, #ffffff, rgba(0,0,0,0)); background-repeat: repeat; background-size: 250px 250px; animation: moveStars 150s linear infinite; opacity: 0.4; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: -10000px 5000px; } }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #0e7490; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-300 font-mono h-screen flex flex-col overflow-hidden">
    
    <div class="space-bg"><div class="stars"></div></div>

    <div class="shrink-0 bg-slate-950/90 backdrop-blur border-b border-cyan-800 p-4 shadow-[0_10px_30px_rgba(0,0,0,0.8)] z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <i data-lucide="zap" class="w-6 h-6 text-amber-500"></i>
                <h1 class="text-xl font-bold text-slate-100 tracking-widest">BLITZ MASTER CONSOLE</h1>
                <span id="sysStatusBadge" class="bg-slate-900 border border-slate-500 text-slate-400 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest">WAITING</span>
            </div>
            
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <button onclick="resetBuzzer()" class="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 font-bold py-2 px-6 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm shadow-[0_0_10px_rgba(255,255,255,0.1)]">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> RESET ROUND
                </button>
            </div>
        </div>
    </div>

    <div class="flex-1 p-4 md:p-6 flex flex-col xl:flex-row gap-6 max-w-7xl mx-auto w-full min-h-0">
        
        <div class="w-full xl:w-1/3 flex flex-col gap-6 shrink-0 min-h-0 overflow-y-auto custom-scroll pr-2">
            
            <div class="bg-slate-900/60 backdrop-blur border border-slate-700 p-5 rounded-lg shadow-2xl shrink-0">
                <h2 class="text-sm font-bold text-fuchsia-400 mb-3 flex items-center gap-2 uppercase tracking-widest border-b border-slate-800 pb-2">
                    <i data-lucide="users" class="w-4 h-4"></i> Team Management
                </h2>
                <form id="teamForm" class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[9px] text-slate-500 uppercase mb-1">Team ID</label>
                            <input type="text" id="teamId" class="w-full bg-[#030712] border border-slate-700 rounded p-2 text-cyan-300 text-xs focus:border-cyan-500 focus:outline-none" required>
                        </div>
                        <div>
                            <label class="block text-[9px] text-slate-500 uppercase mb-1">Display Name</label>
                            <input type="text" id="teamName" class="w-full bg-[#030712] border border-slate-700 rounded p-2 text-cyan-300 text-xs focus:border-cyan-500 focus:outline-none" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[9px] text-slate-500 uppercase mb-1">Access Code</label>
                        <input type="text" id="accessCode" class="w-full bg-[#030712] border border-slate-700 rounded p-2 text-cyan-300 text-xs focus:border-cyan-500 focus:outline-none" required>
                    </div>
                    <button type="submit" class="w-full bg-fuchsia-900/80 hover:bg-fuchsia-700 border border-fuchsia-500 text-fuchsia-100 font-bold py-2 rounded tracking-widest transition-colors uppercase text-xs">Register / Update Team</button>
                </form>
            </div>

            <div class="bg-slate-900/60 backdrop-blur border border-slate-700 p-5 rounded-lg shadow-2xl flex flex-col min-h-[400px]">
                <h2 class="text-sm font-bold text-cyan-400 mb-3 flex items-center gap-2 uppercase tracking-widest shrink-0 border-b border-slate-800 pb-2">
                    <i data-lucide="database" class="w-4 h-4"></i> 20-Question Bank
                </h2>
                <form id="qBankForm" class="flex flex-col min-h-0 flex-1">
                    <div id="qInputsContainer" class="flex-1 overflow-y-auto custom-scroll pr-2 space-y-2 mb-4">
                        </div>
                    <button type="submit" class="w-full shrink-0 bg-cyan-900/80 hover:bg-cyan-700 border border-cyan-500 text-cyan-100 font-bold py-2 rounded tracking-widest transition-colors uppercase text-xs">
                        Save Bank to Cloud
                    </button>
                    <div id="qSaveMsg" class="text-emerald-500 text-center text-[10px] hidden font-bold mt-1">Saved!</div>
                </form>
            </div>

        </div>

        <div class="flex-1 flex flex-col gap-6 min-h-0">
            
            <div class="bg-slate-900/60 backdrop-blur border border-slate-700 p-5 rounded-lg shadow-2xl shrink-0 border-t-4 border-t-cyan-500">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold text-cyan-400 flex items-center gap-2 uppercase tracking-widest">
                        <i data-lucide="radio" class="w-4 h-4"></i> Live Broadcast Queue
                    </h2>
                    <div class="bg-[#030712] border border-slate-700 px-4 py-1 rounded-full text-cyan-300 font-bold text-sm tracking-widest">
                        Q: <span id="queueIndexDisplay">1</span> / 20
                    </div>
                </div>
                
                <div class="bg-[#030712] border border-slate-800 p-4 rounded-lg mb-4 min-h-[80px] flex items-center justify-center text-center shadow-inner">
                    <p id="queueTextPreview" class="text-slate-400 italic text-sm">Loading queue...</p>
                </div>
                
                <div class="flex gap-3">
                    <button onclick="prevQuestion()" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 font-bold py-3 px-4 rounded transition-colors flex items-center justify-center">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    
                    <button id="btnPlay" onclick="playQuestion()" class="flex-1 bg-amber-900/80 hover:bg-amber-700 border border-amber-500 text-amber-100 font-bold py-3 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm uppercase shadow-[0_0_15px_rgba(245,158,11,0.3)]">
                        <i data-lucide="zap" class="w-5 h-5"></i> Broadcast Question & Arm Buzzers
                    </button>
                    
                    <button onclick="nextQuestion()" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 font-bold py-3 px-4 rounded transition-colors flex items-center justify-center">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div id="winnerPanel" class="bg-[#0a1128] border-2 border-emerald-500/50 p-5 rounded-lg shadow-[0_0_40px_rgba(16,185,129,0.15)] text-center hidden shrink-0 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-emerald-400"></div>
                <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest mb-1"><i data-lucide="bell-ring" class="w-3 h-3 inline mr-1"></i> SIGNAL INTERCEPTED BY</p>
                <h2 id="winnerDisplay" class="text-3xl font-black text-slate-100 uppercase tracking-widest mb-4 truncate drop-shadow-[0_0_10px_currentColor]">TEAM NAME</h2>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="awardPoints(5)" class="bg-emerald-900/80 hover:bg-emerald-700 border border-emerald-400 text-emerald-100 font-bold py-4 rounded tracking-widest transition-colors flex flex-col items-center justify-center gap-1 shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                        <span class="text-2xl leading-none">+5</span>
                        <span class="text-[10px] uppercase">CORRECT</span>
                    </button>
                    <button onclick="awardPoints(-5)" class="bg-red-900/80 hover:bg-red-700 border border-red-500 text-red-100 font-bold py-4 rounded tracking-widest transition-colors flex flex-col items-center justify-center gap-1 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                        <span class="text-2xl leading-none">-5</span>
                        <span class="text-[10px] uppercase">INCORRECT</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 bg-slate-900/40 backdrop-blur border border-slate-800 rounded-lg p-4 flex flex-col min-h-0">
                <h2 class="text-sm font-bold text-emerald-400 flex items-center gap-2 uppercase tracking-widest mb-3 shrink-0"><i data-lucide="bar-chart-2" class="w-4 h-4"></i> Live Roster</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 overflow-y-auto custom-scroll pr-2 pb-2" id="adminTeamList">
                    <div class="text-center text-slate-500 py-10 animate-pulse col-span-full">Fetching live network data...</div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAzKmv4xmg_9pQhX06HUmV74J3Ge5e0l3o", authDomain: "stochastoliga.firebaseapp.com", projectId: "stochastoliga", storageBucket: "stochastoliga.firebasestorage.app", messagingSenderId: "684026163908", appId: "1:684026163908:web:a69ebd4a7dcdb83020cf91" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        lucide.createIcons();

        const stateRef = ref(db, 'system/blitzState');
        const bankRef = ref(db, 'system/blitzQuestions');
        
        let currentWinnerId = null;
        let loadedQuestions = Array(20).fill('');
        let queueIndex = 0;

        // 1. GENERATE 20 INPUTS FOR QUESTION BANK
        const qContainer = document.getElementById('qInputsContainer');
        for(let i=1; i<=20; i++) {
            qContainer.innerHTML += `
                <div class="flex gap-2 items-start">
                    <div class="bg-slate-800 text-slate-400 text-[10px] px-2 py-1 rounded border border-slate-700 mt-1 w-8 text-center shrink-0">Q${i}</div>
                    <textarea id="bq${i}" placeholder="Enter Question ${i}..." class="w-full bg-[#030712] border border-slate-700 rounded p-2 text-xs text-cyan-100 min-h-[40px] focus:outline-none focus:border-cyan-500"></textarea>
                </div>`;
        }

        // 2. QUEUE & BANK LOGIC
        function updateQueueDisplay() {
            document.getElementById('queueIndexDisplay').innerText = queueIndex + 1;
            const textPreview = loadedQuestions[queueIndex] || "No question configured for this slot.";
            document.getElementById('queueTextPreview').innerText = textPreview;
            document.getElementById('queueTextPreview').className = loadedQuestions[queueIndex] ? "text-cyan-100 text-sm font-medium" : "text-slate-500 italic text-sm";
        }

        window.nextQuestion = () => { if(queueIndex < 19) { queueIndex++; updateQueueDisplay(); } }
        window.prevQuestion = () => { if(queueIndex > 0) { queueIndex--; updateQueueDisplay(); } }

        get(bankRef).then(snap => {
            if(snap.exists()) {
                loadedQuestions = snap.val() || Array(20).fill('');
                loadedQuestions.forEach((q, index) => {
                    if(document.getElementById(`bq${index+1}`)) {
                        document.getElementById(`bq${index+1}`).value = q || '';
                    }
                });
            }
            updateQueueDisplay();
        });

        document.getElementById('qBankForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const questions = [];
            for(let i=1; i<=20; i++) { questions.push(document.getElementById(`bq${i}`).value); }
            set(bankRef, questions).then(() => {
                document.getElementById('qSaveMsg').classList.remove('hidden');
                setTimeout(() => document.getElementById('qSaveMsg').classList.add('hidden'), 3000);
                loadedQuestions = questions;
                updateQueueDisplay();
            });
        });

        // 3. TEAM MANAGEMENT
        document.getElementById('teamForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const teamId = document.getElementById('teamId').value.trim();
            update(ref(db, 'teams/' + teamId), {
                id: teamId, name: document.getElementById('teamName').value.trim(), accessCode: document.getElementById('accessCode').value.trim().toLowerCase(),
                status: 'active', color: 'bg-cyan-500'
            }).then(() => { e.target.reset(); });
        });

        window.editTeam = function(teamId) {
            const t = window[`teamData_${teamId}`];
            document.getElementById('teamId').value = t.id; 
            document.getElementById('teamName').value = t.name; 
            document.getElementById('accessCode').value = t.accessCode; 
        }
        window.deleteTeam = function(teamId) { if(confirm("Delete team?")) remove(ref(db, 'teams/' + teamId)); }

        // 4. GAME CONTROL LOGIC
        window.playQuestion = () => {
            const text = loadedQuestions[queueIndex];
            if(!text || text.trim() === "") return alert("Please configure a question for this slot before broadcasting.");
            
            // Instantly start dictating and arm buzzers
            set(stateRef, {
                status: 'playing',
                text: text,
                winnerId: null,
                winnerName: null
            });
            
            document.getElementById('btnPlay').disabled = true;
            document.getElementById('btnPlay').className = "flex-1 bg-slate-800 border border-slate-700 text-slate-500 font-bold py-3 rounded tracking-widest flex items-center justify-center gap-2 text-sm uppercase cursor-not-allowed";
        };

        window.resetBuzzer = () => {
            set(stateRef, { status: 'waiting', text: '', winnerId: null, winnerName: null });
            
            document.getElementById('btnPlay').disabled = false;
            document.getElementById('btnPlay').className = "flex-1 bg-amber-900/80 hover:bg-amber-700 border border-amber-500 text-amber-100 font-bold py-3 rounded tracking-widest transition-colors flex items-center justify-center gap-2 text-sm uppercase shadow-[0_0_15px_rgba(245,158,11,0.3)]";
        };

        window.awardPoints = (amount) => {
            if(!currentWinnerId) return;
            const scoreRef = ref(db, `teams/${currentWinnerId}/score`);
            get(scoreRef).then((snap) => {
                const current = snap.val() || 0;
                set(scoreRef, current + amount).then(() => {
                    // Auto-progress to next question and reset
                    nextQuestion();
                    resetBuzzer();
                });
            });
        };

        // 5. LISTEN TO STATE CHANGES
        onValue(stateRef, (snapshot) => {
            const state = snapshot.val() || { status: 'waiting' };
            const badge = document.getElementById('sysStatusBadge');
            const winnerPanel = document.getElementById('winnerPanel');
            
            if (state.status === 'waiting') { 
                badge.className = "bg-slate-900 border border-slate-500 text-slate-400 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest"; badge.innerText = "WAITING"; 
                winnerPanel.classList.add('hidden');
                currentWinnerId = null;
            } 
            else if (state.status === 'playing') { 
                badge.className = "bg-cyan-900 border border-cyan-400 text-cyan-300 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest shadow-[0_0_10px_rgba(34,211,238,0.5)] animate-pulse"; badge.innerText = "BROADCASTING & ARMED"; 
            }
            else if (state.status === 'locked') { 
                badge.className = "bg-emerald-900 border border-emerald-400 text-emerald-300 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest"; badge.innerText = "LOCKED"; 
                
                currentWinnerId = state.winnerId;
                document.getElementById('winnerDisplay').innerText = state.winnerName;
                winnerPanel.classList.remove('hidden');
            }
        });

        // 6. LIVE SCOREBOARD
        onValue(ref(db, 'teams'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('adminTeamList'); container.innerHTML = '';
            if (!data) return;

            const teamsArray = [];
            for (const key in data) {
                window[`teamData_${key}`] = data[key];
                teamsArray.push(data[key]);
            }
            teamsArray.sort((a, b) => (b.score || 0) - (a.score || 0));

            teamsArray.forEach((team) => {
                const cardHtml = `
                    <div class="bg-[#030712] border border-slate-700 p-3 rounded-lg flex items-center justify-between shadow-lg">
                        <div class="overflow-hidden w-2/3">
                            <div class="text-xs font-bold text-slate-200 uppercase tracking-widest truncate" title="${team.name}">${team.name}</div>
                            <div class="flex gap-2 mt-2">
                                <button onclick="editTeam('${team.id}')" class="text-[9px] bg-slate-800 hover:bg-slate-700 border border-slate-600 px-2 py-0.5 rounded">Edit</button>
                                <button onclick="deleteTeam('${team.id}')" class="text-[9px] bg-red-900/50 hover:bg-red-800 border border-red-700 text-red-300 px-2 py-0.5 rounded">Del</button>
                            </div>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 rounded px-3 py-1.5 text-center shrink-0">
                            <div class="text-[8px] text-slate-500 uppercase">SCORE</div>
                            <div class="text-lg font-bold text-emerald-400 tabular-nums">${team.score || 0}</div>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        });
    </script>
</body>
</html>
